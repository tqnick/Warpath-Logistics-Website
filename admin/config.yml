backend:
  name: git-gateway
  branch: main

media_folder: "assets"
public_folder: "/assets"

collections:
  - name: "settings"
    label: "Settings"
    files:
      - label: "Business Info"
        name: "business_info"
        file: "admin/site-settings.yml"
        fields:
          - label: "Business Name"
            name: "business_name"
            widget: "string"
          - label: "Phone"
            name: "phone"
            widget: "string"
          - label: "Email"
            name: "email"
            widget: "string"
