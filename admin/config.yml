backend:
  name: git-gateway
  branch: main

media_folder: "assets/uploads"
public_folder: "/assets/uploads"

collections:
  - name: "home"
    label: "Home Page"
    files:
      - label: "Home Content"
        name: "home"
        file: "content/home.json"
        fields:
          - { label: "Headline", name: "headline", widget: "string" }
          - { label: "Subheadline", name: "subheadline", widget: "string" }
          - { label: "Hero Image", name: "hero_image", widget: "image" }

  - name: "services"
    label: "Services"
    folder: "content/services"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Service Name", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Image", name: "image", widget: "image" }

  - name: "equipment"
    label: "Equipment"
    folder: "content/equipment"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Equipment Name", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Image", name: "image", widget: "image" }

  - name: "testimonials"
    label: "Testimonials"
    folder: "content/testimonials"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Customer Name", name: "name", widget: "string" }
      - { label: "Review", name: "review", widget: "text" }

  - name: "loads"
    label: "Load Requests"
    folder: "content/loads"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Pickup Location", name: "pickup", widget: "string" }
      - { label: "Delivery Location", name: "delivery", widget: "string" }
      - { label: "Cargo Type", name: "cargo", widget: "string" }
      - { label: "Weight", name: "weight", widget: "string" }

  - name: "blog"
    label: "Blog"
    folder: "content/blog"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "settings"
    label: "Settings"
    files:
      - label: "Business Info"
        name: "business"
        file: "content/settings/business.json"
        fields:
          - { label: "Business Name", name: "name", widget: "string" }
          - { label: "Phone", name: "phone", widget: "string" }
          - { label: "Email", name: "email", widget: "string" }
          - { label: "City", name: "city", widget: "string" }
